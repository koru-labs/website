syntax = "proto3";

package tokenproof.v1;

option go_package = "./token_grpc";

// Token service interface
service TokenService {
  rpc GenerateMintProof       (GenerateProofRequest)         returns (GenerateProofResponse);
  rpc GenerateTransferProof   (GenerateProofRequest)         returns (GenerateProofResponse);
  rpc GenerateDirectTransfer  (GenerateProofRequest)         returns (GenerateProofResponse);
  rpc GenerateSplitToken      (GenerateProofRequest)         returns (GenerateProofResponse);
  rpc GenerateApproveProof    (GenerateProofRequest)         returns (GenerateProofResponse);
  rpc GenerateTransferFromProof (GenerateProofRequest)       returns (GenerateProofResponse);
  rpc GenerateBurnProof        (GenerateProofRequest)        returns (GenerateProofResponse);
  rpc GetMintProof            (ProofRequest)                 returns (MintProofResponse);
  rpc GetTransferProof        (ProofRequest)                 returns (TransferProofResponse);
  rpc GetApproveProof         (ProofRequest)                 returns (ApproveProofResponse);
  rpc GetTransferFromProof    (ProofRequest)                 returns (TransferFromProofResponse);
  rpc GetBurnProof            (ProofRequest)                 returns (BurnProofResponse);
  rpc GetAddressBalance       (DecodeBalanceRequest)        returns (AddressBalanceResponse);
  rpc GetAddressAllowance     (AddressAllowanceRequest)     returns (AddressAllowanceResponse);
  rpc GetMintAllowed          (MintAllowedRequest)          returns (MintAllowedResponse);
  rpc ElgamalEncodeAmount     (EncodeAmountRequest)         returns (EncodeAmountResponse);
  rpc GetSplitToken           (ProofRequest)                returns (SplitTokenResponse);
}


// Token action status enum
enum TokenActionStatusEnum {
  TOKEN_ACTION_STATUS_PENDING = 0;
  TOKEN_ACTION_STATUS_PROVE_SUC = 1;
  TOKEN_ACTION_STATUS_SUC = 2;
  TOKEN_ACTION_STATUS_CALL_L1 = 3;
  TOKEN_ACTION_STATUS_FAIL = 4;
  TOKEN_ACTION_STATUS_PENDING_PROOF = 5;
  TOKEN_ACTION_STATUS_CALL_L1_SUC = 6;
}

message ProofRequest {
  string requestId = 1;
}

message ElGamal {
  string cl_x = 1;
  string cl_y = 2;
  string cr_x = 3;
  string cr_y = 4;
}

message Allowance {
  string cl_x = 1;
  string cl_y = 2;
  string cr1_x = 5;
  string cr1_y = 6;
  string cr2_x = 7;
  string cr2_y = 8;
}

message MintProofResponse {
  string request_id = 1;
  string sc_address = 2;
  uint64 token_type = 3;
  string from_address = 4;
  string to_address = 5;
  ElGamal supply_amount = 6;
  ElGamal amount = 7;
  string  proof = 8;
  TokenActionStatusEnum status = 9;
}

message TransferProofResponse {
  string request_id = 1;
  string sc_address = 2;
  uint64 token_type = 3;
  string from_address = 4;
  string to_address = 5;
  repeated string parentTokenId = 6;
  ElGamal old_balance = 7;
  ElGamal new_balance = 8;
  ElGamal amount = 9;
  string proof = 10;
  TokenActionStatusEnum status = 11;
}


message ApproveProofResponse {
  string request_id = 1;
  string sc_address = 2;
  uint64 token_type = 3;
  string from_address = 4;
  string to_address = 5;
  repeated string parentTokenId = 6;
  ElGamal old_balance = 7;
  ElGamal new_balance = 8;
  Allowance allowance = 9;
  string proof = 10;
  TokenActionStatusEnum status = 11;
}

message TransferFromProofResponse {
  string request_id = 1;
  string sc_address = 2;
  uint64 token_type = 3;
  string from_address = 4;
  string to_address = 5;
  Allowance old_allowance = 6;
  Allowance new_allowance = 7;
  ElGamal amount = 8;
  string proof = 9;
  TokenActionStatusEnum status = 10;
}

message BurnProofResponse {
  string request_id = 1;
  string sc_address = 2;
  uint64 token_type = 3;
  string from_address = 4;
  string to_address = 5;
  repeated string parentTokenId = 6;
  ElGamal supply_decrease = 7;
  ElGamal new_balance = 8;
  ElGamal amount = 9;
  string proof = 10;
  TokenActionStatusEnum status = 11;
}

message GenerateProofRequest {
  string sc_address = 1;
  uint64 token_type = 2;
  string from_address = 3;
  string to_address = 4;
  string spender_address = 5;
  uint64 amount = 6;
}

message GenerateProofResponse {
  string request_id = 1;
  TokenActionStatusEnum status = 2;
}

message DecodeBalanceRequest {
  string owner_address = 1;
  string sc_address = 2;
  ElGamal balance = 3;
}

message AddressBalanceResponse {
  uint64 balance = 1;
  string decryptBalance = 2;
}

message AddressAllowanceRequest {
  string owner_address = 1;
  string spender_address = 2;
  string sc_address = 3;
}
message MintAllowedRequest {
  string sc_address = 3;
}

message MintAllowedResponse {
  uint64 amount = 1;
}
message AddressAllowanceResponse {
  uint64 amount = 1;
}

message EncodeAmountRequest {
  uint64 amount = 1;
}

message EncodeAmountResponse {
  ElGamal amount = 1;
}

message SplitTokenResponse {
  string request_id = 1;
  TokenActionStatusEnum status = 2;
  string transfer_token_id = 3;
}




// Account service interface
service AccountService {
  rpc RegisterAccount       (RegisterAccountRequest)         returns (RegisterAccountResponse);
  rpc UpdateAccountStatus   (UpdateAccountStatusRequest)         returns (AsyncActionResponse);
  rpc UpdateAccountRole   (UpdateAccountRoleRequest)         returns (AsyncActionResponse);
  rpc GetAsyncAction   (AsyncActionRequest)         returns (AsyncActionResponse);
  rpc GetAccount   (GetAccountRequest)         returns (GetAccountResponse);
}

// Account action status enum
enum AsyncActionStatusEnum {
  ASYNC_ACTION_STATUS_PENDING = 0;
  ASYNC_ACTION_STATUS_CALL_L1 = 1;
  ASYNC_ACTION_STATUS_SUC = 2;
  ASYNC_ACTION_STATUS_FAIL = 4;
}
// Account status enum
enum AccountStatusEnum {
  ACCOUNT_STATUS_INACTIVE = 0;
  ACCOUNT_STATUS_ACTIVE = 2;
}



message RegisterAccountRequest {
  string account_address = 1 ;
  string account_role = 2 ;
}

message RegisterAccountResponse {
  string request_id = 1;
  AsyncActionStatusEnum status = 2;
  string message = 3;
}

message UpdateAccountStatusRequest {
  string account_address = 1 ;
  AccountStatusEnum account_status = 2 ;
}

message UpdateAccountRoleRequest {
  string account_address = 1 ;
  string account_role = 2 ;
}

message AsyncActionRequest {
  string request_id = 1;
}
message AsyncActionResponse {
  string request_id = 1;
  AsyncActionStatusEnum status = 2;
}

message GetAccountRequest {
  string account_address = 1 ;
}
message GetAccountResponse {
  string account_address = 1;
  AccountStatusEnum account_status = 2;
  string account_role = 3;
}