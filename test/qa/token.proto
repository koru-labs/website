// TestKey service interface
service TestKeyService {
  rpc GetTestAuthWithCoinAddress       (GetTestAuthWithCoinAddressRequest)         returns (GetTestAuthWithCoinAddressResponse)
  {
    option (google.api.http) = {
      get: "/v1/test/auth-with-coin"
    };
  };
}

message GetTestAuthWithCoinAddressRequest {
}

message GetTestAuthWithCoinAddressResponse {
  repeated SignatureAndMessage signature_and_message = 1;
  string coin_address = 2;
}

message SignatureAndMessage {
  string address = 1;
  string message = 2;
  string signature = 3;
  string role = 4;
}


service NativeTokenService {
  rpc GenerateBatchMintProof       (GenerateBatchedMintRequest)         returns (BatchedMintProofResponse) {
    option (google.api.http) = {
      post: "/v1/batch-mint-proof-generate"
      body: "*"
    };
  };
  rpc GenerateBatchSplitToken       (GenerateBatchedSplitRequest)         returns (BatchedSplitTokenResponse) {
    option (google.api.http) = {
      post: "/v1/batch-split-proof-generate"
      body: "*"
    };
  }
  rpc GetBatchSplitTokenDetail       (GetBatchSplitTokenDetailRequest)         returns (GetBatchSplitTokenDetailResponse) {
    option (google.api.http) = {
      post: "/v1/batch-split-token-detail-query"
      body: "*"
    };
  }
}

message GetBatchSplitTokenDetailRequest {
  string request_id = 1;
}
message GetBatchSplitTokenDetailResponse {
  string code = 1;
  string message = 2;
  repeated TokenDetail consumedIds = 3;
  repeated TokenDetail newTokens = 4;
  repeated string proof = 5;
  repeated string public_input = 6;
  repeated string to_addresses = 7;
  uint64 batched_size = 8;
}
message TokenDetail {
  string token_id = 1;
  string cl_x = 2;
  string cl_y = 3;
  string cr_x = 4;
  string cr_y = 5;
}
message BatchedSplitProof {
  string request_id = 1;
  repeated string proof = 2;
  repeated string public_input = 3;
}
message GenerateBatchedSplitRequest {
  string sc_address = 1 ;
  uint64 token_type = 2 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {type: INTEGER, description:"Token type identifier (optional for ERC20 tokens)"}];
  string from_address = 3;
  repeated AccountInfo to_accounts = 4;

}
message BatchedSplitTokenResponse {
  string request_id = 1;
  uint64 BatchedSize = 2;
  TokenActionStatusEnum status = 3;
}


message GenerateBatchedMintRequest {
  string sc_address = 1 ;
  uint64 token_type = 2 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {type: INTEGER, description:"not needed for ERC20"}];
  string from_address = 3;
  repeated AccountInfo to_accounts = 4;
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema:{
      required:["sc_address", "to_address", "amount", "from_address"]
    },
    example: "{\"scAddress\": \"0x65580aEaF79a26aC0f61F7BA914bF900956eBA98\", \"tokenType\": \"0\", \"fromAddress\": \"0xf17f52151EbEF6C7334FAD080c5704D77216b732\", \"toAddress\": \"0x57829d5E80730D06B1364A2b05342F44bFB70E8f\", \"amount\":1 }"
  };
}

message AccountInfo {
  string address = 1;
  uint64 amount = 2[(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {type: INTEGER}];
  string comment = 3;
}

message BatchedMintProofResponse {
  string request_id = 1;
  string sc_address = 2;
  uint64 token_type = 3 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {type: INTEGER}];
  string from_address = 4;
  repeated ToAccountInfo to_accounts = 5;
  ElGamalToken mint_allowed = 6;
  repeated string  proof = 7;
  repeated string  input = 8;
  uint64 batched_size = 9;
  TokenActionStatusEnum status = 10;
}

message ToAccountInfo {
  string address = 1;
  ElGamalToken token = 6;
  ElGamalToken supply_amount = 7;
}