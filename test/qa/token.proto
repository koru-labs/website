// Account service interface
service AccountService {
  rpc RegisterAccount       (RegisterAccountRequest)         returns (RegisterAccountResponse)
  {
    option (google.api.http) = {
      post: "/v1/account/register"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "register an account to the system"
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
    };
  };
  rpc UpdateAccountStatus   (UpdateAccountStatusRequest)         returns (AsyncActionResponse)
  {
    option (google.api.http) = {
      post: "/v1/account/update/status"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "update user status to determine whether the user can access system services"
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
    };
  };
  rpc UpdateAccountRole   (UpdateAccountRoleRequest)         returns (AsyncActionResponse)
  {
    option (google.api.http) = {
      post: "/v1/account/update/role"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "update account role"
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
      extensions: {
        key: "x-ignore-in-swagger" value: { bool_value: true }
      }
    };
  };

  rpc GetAsyncAction   (AsyncActionRequest)         returns (AsyncActionResponse)
  {
    option (google.api.http) = {
      get: "/v1/account/async-actions/{request_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "query async action status"
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
    };
  };
  rpc GetAccount   (GetAccountRequest)         returns (GetAccountResponse)
  {
    option (google.api.http) = {
      post: "/v1/account/query"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "query account details"
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
    };
  };
  rpc GetAccountList   (GetAccountListRequest)         returns (GetAccountListResponse)
  {
    option (google.api.http) = {
      post: "/v1/account/query/list"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "query batch account details"
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
    };
  };
  rpc RegisterBankCallerAccount       (RegisterBankCallerRequest)         returns (RegisterBankCallerResponse)
  {
    option (google.api.http) = {
      post: "/v1/bank/caller/register"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "register a caller user in the contract for permission verification when the bank invokes the split operation"
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
    };
  };
}

// Account action status enum
enum AsyncActionStatusEnum {
  ASYNC_ACTION_STATUS_PENDING = 0;
  ASYNC_ACTION_STATUS_CALL_L1 = 1;
  ASYNC_ACTION_STATUS_SUC = 2;
  ASYNC_ACTION_STATUS_FAIL = 4;
}
// Account status enum
enum AccountStatusEnum {
  ACCOUNT_STATUS_INACTIVE = 0;
  ACCOUNT_STATUS_ACTIVE = 2;
}



message RegisterAccountRequest {
  string account_address = 1 [(validate.rules).string = {min_len: 42, max_len: 42, pattern: "^0x[a-fA-F0-9]{40}$"},
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "The Ethereum address of the account to register"}];
  string account_roles = 2 [(validate.rules).string = {
    pattern: "^((normal|admin|minter)(,(normal|admin|minter))*)?$"
  },
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "Comma-separated roles of the account (normal,admin,minter)"}];

  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema:{
      required:["account_address", "account_roles"]
    },
    example: "{\"account_address\": \"0x57829d5E80730D06B1364A2b05342F44bFB70E8f\", \"account_roles\": \"admin,minter\"}"
  };
}

message RegisterAccountResponse {
  string request_id = 1;
  AsyncActionStatusEnum status = 2;
  string message = 3;
}

message RegisterBankCallerRequest {
  repeated string account_address = 1;
}

message RegisterBankCallerResponse {
  string request_id = 1;
  AsyncActionStatusEnum status = 2;
  string message = 3;
}

message UpdateAccountStatusRequest {
  string account_address = 1 [(validate.rules).string = {min_len: 42, max_len: 42, pattern: "^0x[a-fA-F0-9]{40}$"},
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "The Ethereum address of the account to update"}];
  AccountStatusEnum account_status = 2 [(validate.rules).enum = {defined_only: true},
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "The new status of the account (0 for inactive, 2 for active)"}];

  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema:{
      required:["account_address", "account_status"]
    },
    example: "{\"account_address\": \"0x57829d5E80730D06B1364A2b05342F44bFB70E8f\", \"account_status\": 2}"
  };
}

message UpdateAccountRoleRequest {
  string account_address = 1 [(validate.rules).string = {min_len: 42, max_len: 42, pattern: "^0x[a-fA-F0-9]{40}$"},
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "The Ethereum address of the account to update"}];
  string account_roles = 2 [(validate.rules).string = {
    pattern: "^((normal|admin|minter)(,(normal|admin|minter))*)?$"
  },
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "Comma-separated roles of the account (normal,admin,minter)"}];

  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema:{
      required:["account_address", "account_roles"]
    },
    example: "{\"account_address\": \"0x57829d5E80730D06B1364A2b05342F44bFB70E8f\", \"account_roles\": \"admin,minter\"}"
  };
}

message AsyncActionRequest {
  string request_id = 1 [(validate.rules).string = {min_len: 1},
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "The unique request ID to query async action status"}];
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema:{
      required:["request_id"]
    },
    example: "{\"account_address\": \"5cc8ca3b67029d2dda87aeda86e05552cfdce107b7ed0a37245eef849afb3b0e\"}"
  };
}
message AsyncActionResponse {
  string request_id = 1;
  AsyncActionStatusEnum status = 2;
  string message = 3;
