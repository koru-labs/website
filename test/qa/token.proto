syntax = "proto3";

package tokenproof.v1;
import "annotations.proto";
option go_package = "./token_grpc";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "ZK-server api";
    version: "1.0";
    description: "ZK-Server API for generating zero-knowledge proofs, managing private tokens, and providing utility services";
  };
  host: "qa-node3-http.hamsa-ucl.com:8080"; // Do not include scheme (http/https)
  base_path: "";
  schemes: HTTP;
};

// Token service interface
service TokenService {

  rpc GenerateMintProof       (GenerateMintRequest)         returns (MintProofResponse) {
    option (google.api.http) = {
      post: "/v1/mint-proof-generate"
      body: "*"
    };

  };
  rpc GenerateSplitToken      (GenerateSplitRequest)         returns (SplitTokenResponse) {
    option (google.api.http) = {
      post: "/v1/split-proof-generate"
      body: "*"
    };

  };
  rpc GenerateApproveProof      (GenerateApproveRequest)         returns (SplitTokenResponse) {
    option (google.api.http) = {
      post: "/v1/approve-proof-generate"
      body: "*"
    };

  };
  rpc GetAddressBalance       (BalanceRequest)               returns (AddressBalanceResponse) {
    option (google.api.http) = {
      post: "/v1/balance-query"
      body: "*"
    };

  };
  rpc GetAddressBalanceDetail       (BalanceRequest)               returns (AddressBalanceDetailResponse) {
    option (google.api.http) = {
      post: "/v1/balance-detail-query"
      body: "*"
    };

  };
  rpc DecodeElgamalAmount     (DecodeAmountRequest)          returns (DecodeAmountResponse) {
    option (google.api.http) = {
      post: "/v1/amount-decode"
      body: "*"
    };

  };
  rpc ConvertToPUSDC     (ConvertToPUSDCRequest)          returns (ConvertToPUSDCResponse) {
    option (google.api.http) = {
      post: "/v1/pusdc-convert"
      body: "*"
    };

  };
  rpc ConvertToUSDC     (ConvertToUSDCRequest)          returns (ConvertToUSDCResponse) {
    option (google.api.http) = {
      post: "/v1/usdc-convert"
      body: "*"
    };

  };
  rpc GetTokenActionStatus     (ProofRequest)                 returns (TokenActionStatusResponse) {
    option (google.api.http) = {
      post: "/v1/token-status-query"
      body: "*"
    };

  };
  rpc EncodeElgamalAmount     (EncodeAmountRequest)          returns (EncodeAmountResponse) {
    option (google.api.http) = {
      post: "/v1/amount-encode"
      body: "*"
    };

  };
  rpc GetSplitTokenList       (SplitTokenListRequest)        returns (SplitTokenListResponse) {
    option (google.api.http) = {
      post: "/v1/split-tokens-query"
      body: "*"
    };

  };
  rpc GetApproveTokenList       (ApproveTokenListRequest)        returns (ApproveTokenListResponse) {
    option (google.api.http) = {
      post: "/v1/approve-tokens-query"
      body: "*"
    };

  };
  rpc GetSplitTokenDetail       (SplitTokenDetailRequest)        returns (SplitTokenDetailResponse) {
    option (google.api.http) = {
      post: "/v1/split-tokens-detail-query"
      body: "*"
    };

  };
  rpc GetMintAllowed       (MintAllowedRequest)        returns (MintAllowedResponse) {
    option (google.api.http) = {
      post: "/v1/mint-allowance-query"
      body: "*"
    };

  };
  rpc GetTokenAmount       (TokenAmountRequest)        returns (TokenAmountResponse) {
    option (google.api.http) = {
      post: "/v1/token-amount-query"
      body: "*"
    };

  };
  rpc SaveTransaction       (SaveTransactionRequest)        returns (SaveTransactionResponse) {
    option (google.api.http) = {
      post: "/v1/transaction-save"
      body: "*"
    };

  }
  rpc GetTransaction      (GetTransactionRequest)        returns (GetTransactionResponse) {
    option (google.api.http) = {
      post: "/v1/transaction-query"
      body: "*"
    };

  }
  rpc GetAssetAddressList      (AssetAddressListRequest)        returns (AssetAddressListResponse) {
    option (google.api.http) = {
      post: "/v1/assets-query"
      body: "*"
    };

  }
  rpc ActivateSmartContract      (ActivateSmartContractRequest)        returns (ActivateSmartContractResponse) {
    option (google.api.http) = {
      post: "/v1/smart-contract-status-update"
      body: "*"
    };

  }
  rpc GetSmartContractList      (GetSmartContractRequest)        returns (GetSmartContractResponse) {
    option (google.api.http) = {
      post: "/v1/smart-contracts-query"
      body: "*"
    };

  }
  rpc AddSmartContract      (AddSmartContractRequest)        returns (AddSmartContractResponse) {
    option (google.api.http) = {
      post: "/v1/smart-contract-add"
      body: "*"
    };

  }
  rpc UploadSmartContractIcon      (UploadSmartContractIconRequest)        returns (UploadSmartContractIconResponse) {
    option (google.api.http) = {
      post: "/v1/smart-contract-icon-upload"
      body: "*"
    };

  }
  rpc GetBankManagerList      (BankManagerListRequest)        returns (BankManagerListResponse) {
    option (google.api.http) = {
      post: "/v1/bank-managers-query"
      body: "*"
    };

  }
}

// Token action status enum
enum TokenActionStatusEnum {
  TOKEN_ACTION_STATUS_PENDING = 0;
  TOKEN_ACTION_STATUS_PROVE_SUC = 1;
  TOKEN_ACTION_STATUS_SUC = 2;
  TOKEN_ACTION_STATUS_CALL_L1 = 3;
  TOKEN_ACTION_STATUS_FAIL = 4;
  TOKEN_ACTION_STATUS_PENDING_PROOF = 5;
  TOKEN_ACTION_STATUS_CALL_L1_SUC = 6;
  TOKEN_ACTION_STATUS_DIRECTTX_WAIT = 7;
  TOKEN_ACTION_STATUS_DIRECT_CALL_L1 = 8;
  TOKEN_ACTION_STATUS_CANCEL_ERROR = 9;
  TOKEN_ACTION_STATUS_WAIT_L2_EVENT = 10;
}
message BankManagerListRequest {
  string manager_address = 1;
}
message BankManagerListResponse {
  repeated BankManager data = 1;
  string code = 2;
  string message = 3;
}
message BankManager {
  string manager_address = 1;
  string inst_name = 2;
  string pk_x = 3;
  string pk_y = 4;
  string rpc_url = 5;
  string node_url = 6;
  string http_url = 7;
  bool black_list = 8;
  string street_address = 9;
  string city = 10;
  string state = 11;
  string zip = 12;
  string suite_no = 13;
}

message UploadSmartContractIconRequest {
  string sc_address = 1;
  string icon = 2;
}
message UploadSmartContractIconResponse {
  string code = 1;
  string message = 2;
}
message GetSmartContractRequest {
  string sc_address = 1;
  SmartContractStatusEnum status = 2[(validate.rules).enum = {defined_only: true},
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "The new status of the smart contract (0 for inactive, 2 for active)"}];
}
message GetSmartContractResponse {
  repeated SmartContract data = 1;
  string code = 2;
  string message = 3;
}
message AddSmartContractRequest {
  string sc_address = 1;
  SmartContractStatusEnum status = 2;
}
message AddSmartContractResponse {
  SmartContract data = 1;
  string code = 2;
  string message = 3;
}
message SmartContract {
  string sc_address = 1;
  string asset_name = 2;
  string exchange_rate = 3;
  SmartContractStatusEnum status = 4;
  string icon = 5;
  uint64 currency_precision = 6;
  string manager_address = 7;
  uint64 created_at = 8;
  string issuer_name = 9;
}
message ActivateSmartContractRequest {
  repeated string sc_addresses = 1;
  SmartContractStatusEnum status = 2[(validate.rules).enum = {defined_only: true},
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "The new status of the smart contract (0 for inactive, 2 for active)"}];
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema:{
      required:["sc_addresses", "status"]
    },
    example: "{\"sc_addresses\": \"0x71253de033d012ea8fcc6650fa8c6c0245860c22\", \"status\": 2}"
  };
}
message ActivateSmartContractResponse {
  string code = 1;
  string message = 2;
}
message SaveTransactionRequest {
  string asset_name = 1;
  string from_address = 2;
  string to_address = 3;
  uint64 amount = 4;
  string type = 5;
  string hash = 6;
  int64 timestamp = 7;
  string metadata = 8;
  int64 currency_precision = 9;
  string exchange_rate = 10;
}
message AssetAddressListRequest {
  string account_address = 1;
  string sc_address = 2;
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema:{
      required:["account_address", "sc_address"]
    },
  };
}
message AssetAddressListResponse {
  repeated AssetDetail data = 1;
  string code = 2;
  string message = 3;
}

message AssetDetail  {
  string account_address = 1;
  string asset_name = 2;
  uint64 quantity = 3;
  uint64 available_quantity = 4;
  string exchange_rate = 5;
  string type = 6;
  bool is_minter = 7;
  string icon = 8;
  string sc_address = 9;
  uint64 currency_precision = 10;
}

message SaveTransactionResponse {
  string code = 1;
  string message = 2;
}

message GetTransactionRequest {
  uint32 page_num = 1;
  uint32 page_size = 2;
  uint32 start_time = 3;
  uint32 end_time = 4;
}

message GetTransactionResponse {
  repeated Transaction data = 1;
  uint64 total_count = 2;
  string code = 3;
  string message = 4;
}

message Transaction {
  string asset_name = 1;
  string from_address = 2;
  string to_address = 3;
  uint64 amount = 4;
  string type = 5;
  string hash = 6;
  int64 currency_precision = 7;
  string exchange_rate = 8;
  int64 timestamp = 9;
}

message Institution {
  string address = 1;
  string manager_address = 2;
  string role = 3;
  uint32 status = 4;
}

message ConvertToPUSDCRequest {
  uint64 amount = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {type: INTEGER}];
  string sc_address = 2;
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema:{
      required:["sc_address", "amount"]
    },
  };
}

message ConvertToPUSDCResponse {
  uint64 amount = 1;
  string token_id = 2;
  ElGamal elgamal = 3;
  repeated string proof = 4;
  repeated string input = 5;
  uint64 status_code = 6;
}

message ConvertToUSDCRequest {
  string token_id = 1;
  string sc_address = 2;
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema:{
      required:["sc_address", "token_id"]
    },
  };
}

message ConvertToUSDCResponse {
  string token_id = 1;
  string owner_address = 2;
  uint64 amount = 3;
  ElGamal elgamal = 4;
  repeated string proof = 5;
  repeated string input = 6;
  uint64 status_code = 7;
}

message ProofRequest {
  string request_id = 1;
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema:{
      required:["request_id"]
    },
  };
}

message ElGamal {
  string cl_x = 1;
  string cl_y = 2;
  string cr_x = 3;
  string cr_y = 4;
}

message ElGamalToken {
  string cl_x = 1;
  string cl_y = 2;
  string cr_x = 3;
  string cr_y = 4;
  string token_id = 5;
  uint64 token_type = 6;
}

message GenerateSplitRequest {
  string sc_address = 1 ;
  uint64 token_type = 2 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {type: INTEGER, description:"Token type identifier (optional for ERC20 tokens)"}];
  string from_address = 3;
  string to_address = 4 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "leave it empty if purpose is to burn token"}];
  uint64 amount = 5 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {type: INTEGER}];
  string comment = 6;
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema:{
      required:["sc_address", "from_address", "amount", "comment"]
    },
    example: "{\"scAddress\": \"0x65580aEaF79a26aC0f61F7BA914bF900956eBA98\", \"tokenType\": \"0\", \"fromAddress\": \"0x57829d5E80730D06B1364A2b05342F44bFB70E8f\", \"toAddress\": \"0x4312488937D47A007De24d48aB82940C809EEb2b\", \"amount\":1 }",
  };
}

message GenerateApproveRequest {
  string sc_address = 1 ;
  uint64 token_type = 2 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {type: INTEGER, description:"not needed for ERC20"}];
  string from_address = 3;
  string to_address = 4 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "leave it empty if purpose is to burn token"}];
  string spender_address = 5;
  uint64 amount = 6 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {type: INTEGER}];
  string comment = 7;
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema:{
      required:["sc_address", "from_address", "amount", "comment"]
    },
    example: "{\"scAddress\": \"0x65580aEaF79a26aC0f61F7BA914bF900956eBA98\", \"tokenType\": \"0\", \"fromAddress\": \"0x57829d5E80730D06B1364A2b05342F44bFB70E8f\", \"toAddress\": \"0x4312488937D47A007De24d48aB82940C809EEb2b\", \"amount\":1 }",
  };
}


message GenerateMintRequest {
  string sc_address = 1 ;
  uint64 token_type = 2 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {type: INTEGER, description:"not needed for ERC20"}];
  string from_address = 3;
  string to_address = 4 ;
  uint64 amount = 5 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {type: INTEGER}];

  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema:{
      required:["sc_address", "to_address", "amount", "from_address"]
    },
    example: "{\"scAddress\": \"0x65580aEaF79a26aC0f61F7BA914bF900956eBA98\", \"tokenType\": \"0\", \"fromAddress\": \"0xf17f52151EbEF6C7334FAD080c5704D77216b732\", \"toAddress\": \"0x57829d5E80730D06B1364A2b05342F44bFB70E8f\", \"amount\":1 }"
  };
}

message BalanceRequest {
  string owner_address = 1 ;
  string sc_address = 2;

  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema:{
      required:["owner_address", "sc_address"]
    },
    example: "{\"ownerAddress\": \"0x57829d5E80730D06B1364A2b05342F44bFB70E8f\", \"scAddress\": \"0x65580aEaF79a26aC0f61F7BA914bF900956eBA98\"}"
  };
}

message DecodeAmountRequest {
  ElGamal balance = 1;
}

message AddressBalanceResponse {
  uint64 balance = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {type: INTEGER}];
}

message AddressBalanceDetailResponse {
  uint64 total_balance = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {type: INTEGER}];
  uint64 available_balance = 2 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {type: INTEGER}];
  uint64 transfer_balance = 3 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {type: INTEGER}];
  uint64 approved_balance = 4 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {type: INTEGER}];
}

message DecodeAmountResponse {
  uint64 balance = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {type: INTEGER}];
  string code = 2;
  string message = 3;
}

message TokenAmountRequest {
  string token_id = 1;
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema:{
      required:["token_id"]
    },
  };
}

message TokenAmountResponse {
  uint64 amount = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {type: INTEGER}];
  uint64 currency_precision = 2;
  string code = 3;
  string message = 4;
}

message MintProofResponse {
  string request_id = 1;
  string sc_address = 2;
  uint64 token_type = 3 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {type: INTEGER}];
  string from_address = 4;
  string to_address = 5;
  ElGamalToken token = 6;
  ElGamalToken supply_amount = 7;
  ElGamalToken mint_allowed = 8;
  repeated string  proof = 9;
  repeated string  input = 10;
  TokenActionStatusEnum status = 11;
}

message MintAllowedRequest {
  string sc_address = 1;
  string address = 2;
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema:{
      required:["sc_address", "address"]
    },
    example: "{\"sc_address\": \"0x65580aEaF79a26aC0f61F7BA914bF900956eBA98\"}"
  };
}
//
//message MintAllowedResponse {
//  repeated MintAllowed mint_allowed = 1;
//}

message MintAllowedResponse {
  uint64 amount = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {type: INTEGER}];
  string address = 2;
}

message SplitTokenResponse {
  string request_id = 1;
  TokenActionStatusEnum status = 2;
  string transfer_token_id = 3;
}

message TokenActionStatusResponse {
  string request_id = 1;
  TokenActionStatusEnum status = 2;
  string transaction_hash = 3;
}

message EncodeAmountRequest {
  uint64 amount = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {type: INTEGER}];

  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema:{
      required:["amount"]
    },
  };
}

message EncodeAmountResponse {
  string token_id = 1;
  ElGamal amount = 2;
}

message SplitTokenListRequest {
  string owner_address = 1 ;
  string sc_address = 2 ;

  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema:{
      required:["owner_address", "sc_address"]
    },
    example: "{\"owner_address\": \"0x57829d5E80730D06B1364A2b05342F44bFB70E8f\", \"sc_address\": \"0x65580aEaF79a26aC0f61F7BA914bF900956eBA98\"}"
  };
}

message ApproveTokenListRequest {
  string owner_address = 1 ;
  string sc_address = 2 ;
  string spender_address = 3 ;
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema:{
      required:["owner_address", "sc_address"]
    },
    example: "{\"owner_address\": \"0x57829d5E80730D06B1364A2b05342F44bFB70E8f\", \"sc_address\": \"0x65580aEaF79a26aC0f61F7BA914bF900956eBA98\"}"
  };
}

message SplitTokenListResponse {
  repeated Token split_tokens = 1;
}

message ApproveTokenListResponse {
  repeated Token split_tokens = 1;
}
message GenerateProofResponse {
  string request_id = 1;
  TokenActionStatusEnum status = 2;
  string message = 3;
}
message Token {
  string token_id = 1;
  string request_id = 2;
  string type = 3;
  uint64 amount = 4 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {type: INTEGER}];
  string from_address = 5;
  string to_address = 6;
  string spender_address = 7;
  string comment = 8;
  TokenActionStatusEnum status = 9;
  string sc_address = 10;
  uint64 currency_precision = 11;
  int64 created_at = 12;
}

message SplitTokenDetailRequest {
  string token_id = 1;
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema:{
      required:["token_id"]
    },
  };
}

message SplitTokenDetailResponse {
  int64 balance = 1;
  int64 transferAmount = 2;
  int64 remainingAmount = 3;
  uint64 currency_precision = 4;
  string code = 5;
  string message = 6;
}

// Account service interface
service AccountService {
  rpc RegisterAccount       (RegisterAccountRequest)         returns (RegisterAccountResponse)
  {
    option (google.api.http) = {
      post: "/v1/account-register"
      body: "*"
    };

  };
  rpc UpdateAccountStatus   (UpdateAccountStatusRequest)         returns (AsyncActionResponse)
  {
    option (google.api.http) = {
      post: "/v1/account-status-update"
      body: "*"
    };

  };
  rpc UpdateAccount   (UpdateAccountRequest)         returns (AsyncActionResponse)
  {
    option (google.api.http) = {
      post: "/v1/account-update"
      body: "*"
    };

  };

  rpc GetAsyncAction   (AsyncActionRequest)         returns (AsyncActionResponse)
  {
    option (google.api.http) = {
      get: "/v1/account-actions-async/{request_id}"
    };

  };
  rpc GetAccount   (GetAccountRequest)         returns (GetAccountResponse)
  {
    option (google.api.http) = {
      post: "/v1/account-query"
      body: "*"
    };

  };
  rpc GetAccountList   (GetAccountListRequest)         returns (GetAccountListResponse)
  {
    option (google.api.http) = {
      post: "/v1/accounts-query"
      body: "*"
    };

  };
  rpc RegisterBankCallerAccount       (RegisterBankCallerRequest)         returns (RegisterBankCallerResponse)
  {
    option (google.api.http) = {
      post: "/v1/bank-caller-register"
      body: "*"
    };

  };
  rpc RegisterInstitution (RegisterInstitutionRequest)        returns (InstitutionResponse) {
    option (google.api.http) = {
      post: "/v1/institution-register"
      body: "*"
    };
  }

  rpc UpdateInstitution (UpdateInstitutionRequest)        returns (InstitutionResponse) {
    option (google.api.http) = {
      post: "/v1/institution-update"
      body: "*"
    };
  }

}

// Account action status enum
enum AsyncActionStatusEnum {
  ASYNC_ACTION_STATUS_PENDING = 0;
  ASYNC_ACTION_STATUS_CALL_L1 = 1;
  ASYNC_ACTION_STATUS_SUC = 2;
  ASYNC_ACTION_STATUS_FAIL = 4;
}
// Account status enum
enum AccountStatusEnum {
  ACCOUNT_STATUS_INACTIVE = 0;
  ACCOUNT_STATUS_ACTIVE = 2;
}

enum SmartContractStatusEnum {
  SMART_CONTRACT_STATUS_INACTIVE = 0;
  SMART_CONTRACT_STATUS_ACTIVE = 2;
  SMART_CONTRACT_STATUS_ALL = 3;
}


message RegisterInstitutionRequest {
  string manager_address = 1[(validate.rules).string = {max_len: 50}];
  string inst_name = 2[(validate.rules).string = {max_len: 200}];
  string pk_x = 3 [(validate.rules).string = {max_len: 100},
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "Grumpkin public key x"}];
  string pk_y = 4[(validate.rules).string = {max_len: 100},
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "Grumpkin public key y"}];
  string rpc_url = 5[(validate.rules).string = {max_len: 100}];
  string node_url = 6[(validate.rules).string = {max_len: 100}];
  string http_url = 7[(validate.rules).string = {max_len: 100}];
  string street_address = 8[(validate.rules).string = {max_len: 100}];
  string city = 9[(validate.rules).string = {max_len: 100}];
  string state = 10[(validate.rules).string = {max_len: 100}];
  string zip = 11[(validate.rules).string = {max_len: 100}];
  string suite_no = 12[(validate.rules).string = {max_len: 100}];
