syntax = "proto3";

package tokenproof.v1;
import "google/api/annotations.proto";
import "annotations.proto";
import "validate.proto";
option go_package = "./token_grpc";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "ZK-server api";
    version: "1.0";
    description: "apis for generating zk-proof, tokens, and utility apis";
  };
  host: "qa-node3-http.hamsa-ucl.com:8080"; // Do not include scheme (http/https)
  base_path: "";
  schemes: HTTP;
};

// Token service interface
service TokenService {

  rpc GenerateMintProof       (GenerateMintRequest)         returns (MintProofResponse) {
    option (google.api.http) = {
      post: "/v1/proof/mint"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "Submit request to generate proof for token mint. This is an asynchronous call. To query the proof,  call /query/proof/mint using the returned request_id in the response"
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
    };
  };
  rpc GenerateSplitToken      (GenerateSplitRequest)         returns (SplitTokenResponse) {
    option (google.api.http) = {
      post: "/v1/split/token"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "submit request to split user balance for future transaction (e.g. transfer, burn). This is an asynchronous call. To query the token Id, call /query/split/token using the returned request_id in the response "
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
    };
  };
  rpc GenerateApproveProof      (GenerateApproveRequest)         returns (SplitTokenResponse) {
    option (google.api.http) = {
      post: "/v1/proof/approve"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "submit request to split user balance for future transaction (e.g. approve). This is an asynchronous call. To query the token Id, call /query/split/token using the returned request_id in the response "
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
    };
  };
  rpc GetAddressBalance       (BalanceRequest)               returns (AddressBalanceResponse) {
    option (google.api.http) = {
      post: "/v1/query/balance"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "query account balance from ZK-server db"
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
    };
  };
  rpc GetAddressBalanceDetail       (BalanceRequest)               returns (AddressBalanceDetailResponse) {
    option (google.api.http) = {
      post: "/v1/query/balance/detail"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "query detailed account balance information from ZK-server db"
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
      extensions: {
        key: "x-ignore-in-swagger" value: { bool_value: true }
      }
    };
  };
  rpc DecodeElgamalAmount     (DecodeAmountRequest)          returns (DecodeAmountResponse) {
    option (google.api.http) = {
      post: "/v1/elgamal/decode"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "request ZK-server to decode ElGamal amount"
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
    };
  };
  rpc ConvertToPUSDC     (ConvertToPUSDCRequest)          returns (ConvertToPUSDCResponse) {
    option (google.api.http) = {
      post: "/v1/convert/pUSDC"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "request ZK-server to covert amount to pUSDC"
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
    };
  };
  rpc ConvertToUSDC     (ConvertToUSDCRequest)          returns (ConvertToUSDCResponse) {
    option (google.api.http) = {
      post: "/v1/convert/USDC"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "request ZK-server to covert ElGamal amount to USDC"
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
    };
  };
  rpc GetSplitToken           (ProofRequest)                 returns (SplitTokenResponse) {
    option (google.api.http) = {
      post: "/v1/query/split/token"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "query the generated tokenId using requestId"
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
    };
  };
  rpc GetTokenActionStatus     (ProofRequest)                 returns (TokenActionStatusResponse) {
    option (google.api.http) = {
      post: "/v1/query/token/status"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "query the request status using requestId"
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
    };
  };
  rpc EncodeElgamalAmount     (EncodeAmountRequest)          returns (EncodeAmountResponse) {
    option (google.api.http) = {
      post: "/v1/elgamal/encode"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "request ZK-server to encode amount in ElGamal format"
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
    };
  };
  rpc GetSplitTokenList       (SplitTokenListRequest)        returns (SplitTokenListResponse) {
    option (google.api.http) = {
      post: "/v1/query/split/tokens"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "list split tokens not consumed. To cancel tokens not needed, call smart contract function PrivateERCToken.privateCancelToken"
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
    };
  };
  rpc GetApproveTokenList       (ApproveTokenListRequest)        returns (ApproveTokenListResponse) {
    option (google.api.http) = {
      post: "/v1/query/approve/tokens"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "list split tokens not consumed. To cancel tokens not needed, call smart contract function PrivateERCToken.privateCancelToken"
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
    };
  };
  rpc GetSplitTokenDetail       (SplitTokenDetailRequest)        returns (SplitTokenDetailResponse) {
    option (google.api.http) = {
      post: "/v1/query/split/tokens/detail"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "list split tokens not consumed. To cancel tokens not needed, call smart contract function PrivateERCToken.privateCancelToken"
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
    };
  };
  rpc GetMintAllowed       (MintAllowedRequest)        returns (MintAllowedResponse) {
    option (google.api.http) = {
      post: "/v1/query/mint/allowed"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "query the mint allowed amount using smart contract address"
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
    };
  };
  rpc GetTokenAmount       (TokenAmountRequest)        returns (TokenAmountResponse) {
    option (google.api.http) = {
      post: "/v1/query/token/amount"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "query the token amount using token_id"
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
    };
  };
  rpc SaveTransaction       (SaveTransactionRequest)        returns (SaveTransactionResponse) {
    option (google.api.http) = {
      post: "/v1/save/transaction"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "save transaction details to the database (methods such as mint/transfer/burn invoked from the UI page are stored as records)"
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
      extensions: {
        key: "x-ignore-in-swagger" value: { bool_value: true }
      }
    };
  }
  rpc GetTransaction      (GetTransactionRequest)        returns (GetTransactionResponse) {
    option (google.api.http) = {
      post: "/v1/query/transaction"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "query transaction details to the database"
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
      extensions: {
        key: "x-ignore-in-swagger" value: { bool_value: true }
      }
    };
  }
  rpc GetAssetAddressList      (AssetAddressListRequest)        returns (AssetAddressListResponse) {
    option (google.api.http) = {
      post: "/v1/query/asset/address"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "query user token/ptoken balance and details within active contracts"
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
    };
  }
  rpc ActivateSmartContract      (ActivateSmartContractRequest)        returns (ActivateSmartContractResponse) {
    option (google.api.http) = {
      post: "/v1/active/smart-contract"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "enable/disable smart contract using manager account"
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
    };
  }
  rpc GetSmartContractList      (GetSmartContractRequest)        returns (GetSmartContractResponse) {
    option (google.api.http) = {
      post: "/v1/get/smart-contract"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "get smart contract list in zk-server database"
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
    };
  }
  rpc AddSmartContract      (AddSmartContractRequest)        returns (AddSmartContractResponse) {
    option (google.api.http) = {
      post: "/v1/add/smart-contract"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "sync on-chain smart-contract information into the zk-server database"
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
      extensions: {
        key: "x-ignore-in-swagger" value: { bool_value: true }
      }
    };
  }
  rpc UploadSmartContractIcon      (UploadSmartContractIconRequest)        returns (UploadSmartContractIconResponse) {
    option (google.api.http) = {
      post: "/v1/upload/smart-contract/icon"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "upload a Base64-encoded custom icon for the smart contract to be displayed on the page"
      parameters: {
        headers:[
          {
            name: "Grpc-Metadata-Message"
            type: STRING
            description: "message to sign"
            required: true
          },
          {
            name: "Grpc-Metadata-Signature"
            type: STRING
            description: "message signature"
            required: true
          }
        ]
      }
      extensions: {
        key: "x-ignore-in-swagger" value: { bool_value: true }
      }
    };
  }
}

// Token action status enum
enum TokenActionStatusEnum {
  TOKEN_ACTION_STATUS_PENDING = 0;
  TOKEN_ACTION_STATUS_PROVE_SUC = 1;
  TOKEN_ACTION_STATUS_SUC = 2;
  TOKEN_ACTION_STATUS_CALL_L1 = 3;
  TOKEN_ACTION_STATUS_FAIL = 4;
  TOKEN_ACTION_STATUS_PENDING_PROOF = 5;
  TOKEN_ACTION_STATUS_CALL_L1_SUC = 6;
  TOKEN_ACTION_STATUS_DIRECTTX_WAIT = 7;
  TOKEN_ACTION_STATUS_DIRECT_CALL_L1 = 8;
  TOKEN_ACTION_STATUS_CANCEL_ERROR = 9;
  TOKEN_ACTION_STATUS_WAIT_L2_EVENT = 10;
}
message UploadSmartContractIconRequest {
  string sc_address = 1;
  string icon = 2;
}
message UploadSmartContractIconResponse {
  string code = 1;
  string message = 2;
}
message GetSmartContractRequest {
  string sc_address = 1;
  uint64 status = 2;
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema:{
      required:["sc_address"]
    },
  };
}
message GetSmartContractResponse {
  repeated SmartContract data = 1;
  string code = 2;
  string message = 3;
}
message AddSmartContractRequest {
  string sc_address = 1;
  uint64 status = 2;
}
message AddSmartContractResponse {
  SmartContract data = 1;
  string code = 2;
  string message = 3;
}
message SmartContract {
  string sc_address = 1;
  string asset_name = 2;
  string exchange_rate = 3;
  uint64 status = 4;
  string icon = 5;
  uint64 currency_precision = 6;
  string manager_address = 7;
}
message ActivateSmartContractRequest {
  repeated string sc_addresses = 1;
  uint64 status = 2;
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema:{
      required:["sc_addresses", "status"]
    },
  };
}
message ActivateSmartContractResponse {
  string code = 1;
  string message = 2;
}
message SaveTransactionRequest {
  string asset_name = 1;
  string from_address = 2;
  string to_address = 3;
  uint64 amount = 4;
  string type = 5;
  string hash = 6;
  int64 timestamp = 7;
  string metadata = 8;
  int64 currency_precision = 9;
  string exchange_rate = 10;
}
message AssetAddressListRequest {
  string account_address = 1;
  string sc_address = 2;
}
message AssetAddressListResponse {
  repeated AssetDetail data = 1;
  string code = 2;
  string message = 3;
}

message AssetDetail  {
  string asset_address = 1;
  string asset_name = 2;
  uint64 quantity = 3;
  uint64 available_quantity = 4;
  string exchange_rate = 5;
  string type = 6;
  bool is_minter = 7;
  string icon = 8;
  string sc_address = 9;
  uint64 currency_precision = 10;
}

message SaveTransactionResponse {
  string code = 1;
  string message = 2;
}

message GetTransactionRequest {
  uint32 page_num = 1;
  uint32 page_size = 2;
  uint32 start_time = 3;
  uint32 end_time = 4;
}

message GetTransactionResponse {
  repeated Transaction data = 1;
  string code = 2;
  string message = 3;
}

message Transaction {
  string asset_name = 1;
  string from_address = 2;
  string to_address = 3;
  uint64 amount = 4;
  string type = 5;
  string hash = 6;
  int64 currency_precision = 7;
  string exchange_rate = 8;
  int64 timestamp = 9;
}

message Institution {
  string address = 1;
  string manager_address = 2;
  string role = 3;
  uint32 status = 4;
}

message ConvertToPUSDCRequest {
  uint64 amount = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {type: INTEGER}];
  string sc_address = 2;
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema:{
      required:["sc_address", "amount"]
    },
  };
}

message ConvertToPUSDCResponse {
  uint64 amount = 1;
  string token_id = 2;
  ElGamal elgamal = 3;
  repeated string proof = 4;
  repeated string input = 5;
  uint64 status_code = 6;
}

message ConvertToUSDCRequest {
  string token_id = 1;
  string sc_address = 2;
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema:{
      required:["sc_address", "token_id"]
    },
  };
}

message ConvertToUSDCResponse {
  string token_id = 1;
  string owner_address = 2;
  uint64 amount = 3;
  ElGamal elgamal = 4;
  repeated string proof = 5;
  repeated string input = 6;
  uint64 status_code = 7;
}

message ProofRequest {
  string request_id = 1;
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema:{
      required:["request_id"]
    },
  };
}

message ElGamal {
  string cl_x = 1;
  string cl_y = 2;
  string cr_x = 3;
  string cr_y = 4;
}

message ElGamalToken {
  string cl_x = 1;
  string cl_y = 2;
  string cr_x = 3;
  string cr_y = 4;
  string token_id = 5;
  uint64 token_type = 6;
}

message GenerateSplitRequest {
  string sc_address = 1 ;
  uint64 token_type = 2 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {type: INTEGER, description:"not needed for ERC20"}];
  string from_address = 3;
  string to_address = 4 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "leave it empty if purpose is to burn token"}];
  uint64 amount = 5 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {type: INTEGER}];
  string comment = 6;
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema:{
      required:["sc_address", "from_address", "amount"]
    },
    example: "{\"scAddress\": \"0x65580aEaF79a26aC0f61F7BA914bF900956eBA98\", \"tokenType\": \"0\", \"fromAddress\": \"0x57829d5E80730D06B1364A2b05342F44bFB70E8f\", \"toAddress\": \"0x4312488937D47A007De24d48aB82940C809EEb2b\", \"amount\":1 }",
  };
}

message GenerateApproveRequest {
  string sc_address = 1 ;
  uint64 token_type = 2 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {type: INTEGER, description:"not needed for ERC20"}];
  string from_address = 3;
  string to_address = 4 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {description: "leave it empty if purpose is to burn token"}];
  string spender_address = 5;
  uint64 amount = 6 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {type: INTEGER}];
  string comment = 7;
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema:{
      required:["sc_address", "from_address", "amount"]
    },
